<!DOCTYPE html>
<html>

<head>
<title>EduPredict AI Dashboard</title>

<style>

body{
font-family: Arial;
background:#eef2f7;
text-align:center;
}

.container{
background:white;
padding:30px;
width:450px;
margin:auto;
margin-top:50px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h1{
color:#2c3e50;
}

input{
width:80%;
padding:8px;
margin:5px;
}

button{
background:#3498db;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.result{
margin-top:20px;
padding:15px;
background:#f4f6f8;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>EduPredict AI</h1>
<h3>Student Performance Prediction</h3>

<form method="POST">

<input type="number" step="0.1" name="study_hours" placeholder="Study Hours" required><br>

<input type="number" step="0.1" name="attendance" placeholder="Attendance %" required><br>

<input type="number" name="assignments" placeholder="Assignments Completed" required><br>

<button type="submit">Predict</button>

</form>

{% if prediction %}

<div class="result">

<h2>{{ prediction }}</h2>

<h3>Probability: {{ probability }}%</h3>

<h3>Risk Level: {{ risk }}</h3>

<h3>Study Recommendations</h3>

<ul>
{% for r in recommendation %}
<li>{{ r }}</li>
{% endfor %}
</ul>

{% if graph %}
<img src="{{ graph }}" width="350">
{% endif %}

</div>

{% endif %}

</div>

</body>
</html>
